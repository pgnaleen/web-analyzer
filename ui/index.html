<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Page Analyzer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: auto;
            text-align: center;
        }
        input, button {
            margin: 10px;
            padding: 10px;
            width: 80%;
        }
        pre {
            text-align: left;
            background: #f4f4f4;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h2>Analyze a Web Page</h2>

<input type="text" id="urlInput" placeholder="Enter URL (e.g., https://example.com)">
<button onclick="analyzePage()">Analyze</button>

<h3>Results:</h3>
<pre id="result"></pre>

<script>
    async function analyzePage() {
        const url = document.getElementById("urlInput").value;
        if (!url) {
            alert("Please enter a URL.");
            return;
        }

        const response = await fetch("http://localhost:8080/analyze?url="+url, {
            method: "GET",
            headers: { "Content-Type": "application/json" }
        });

        if (!response.ok) {
            document.getElementById("result").textContent = "Error: Failed to analyze the page.";
            return;
        }

        const data = await response.json();
        document.getElementById("result").textContent = JSON.stringify(data, null, 4);
    }
</script>

</body>
</html>
